server:
  port: 8082
spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/userdb?createDatabaseIfNotExist=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update   # crea/actualiza las tablas automáticamente
    show-sql: true       #  muestra las queries en consola
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

springdoc:
  api-docs:
    enabled: true      # No generar docs automáticas
  swagger-ui:
    url: /account-service.yaml   # Archivo YAML estático dentro de /static
    disable-swagger-default-url: true
  paths-to-match: /**   # <--- NECESARIO para que Swagger funcione con YAML estático
