server:
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive

  cloud:
    gateway:

      routes:

        # =====================================
        # AUTH SERVICE (PUBLIC)
        # =====================================
        - id: auth-service
          uri: http://auth-service:8091/
          predicates:
            - Path=/api/auth/**
          filters: []

        # =====================================
        # USER SERVICE (PUBLIC)
        # =====================================
        - id: user-create
          uri: http://user-service:8082/
          predicates:
            - Method=POST
            - Path=/api/user/**
          filters: []  # PUBLIC

        # =====================================
        # USER SERVICE (ADMIN)
        # =====================================
        # DELETE /api/user/{id}
        - id: user-delete
          uri: http://user-service:8082/
          predicates:
            - Method=DELETE
            - Path=/api/user
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        # GET /api/user/scooters**
        - id: user-scooters-admin
          uri: http://user-service:8082/
          predicates:
            - Path=/api/user/scooters/**
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        # GET /api/user/total-invoice
        - id: user-total-invoice
          uri: http://user-service:8082/
          predicates:
            - Path=/api/user/total-invoice
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        # GET /api/user/scooter-user-usage
        - id: user-scooter-user-usage
          uri: http://user-service:8082/
          predicates:
            - Path=/api/user/scooter-user-usage
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        # POST /api/user/fee
        - id: user-fee-admin
          uri: http://user-service:8082/
          predicates:
            - Method=POST
            - Path=/api/user/fee
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        # =====================================
        # USER SERVICE — USER + ADMIN
        # =====================================

        # /api/user/near-scooters  (USER only)
        - id: user-near-scooters
          uri: http://user-service:8082/
          predicates:
            - Path=/api/user/near-scooters
          filters:
            - name: RoleFilter
              args:
                allowedRoles: USER

        # /api/user/scooter-usages-by-period/{userId}
        - id: user-scooter-usages
          uri: http://user-service:8082/
          predicates:
            - Path=/api/user/scooter-usages-by-period/*
          filters:
            - name: RoleFilter
              args:
                allowedRoles: USER

        # /api/user/chat
        - id: chat
          uri: http://localhost:8082/
          predicates:
            - Path=/api/user/chat
          filters:
            - name: RoleFilter
              args:
                allowedRoles: USER, ADMIN

       # /api/user/historical-data/{userId}
        - id: chatbot-historical-data
          uri: http://localhost:8082/
          predicates:
            - Path=/api/user/historical-data/*
          filters:
            - name: RoleFilter
              args:
                allowedRoles: USER, ADMIN

        # =====================================
        # CHATBOT SERVICE — USER + ADMIN
        # =====================================

        # /api/user/chat
        - id: chat
          uri: http://user-service:8082/
          predicates:
            - Path=/api/user/chat
          filters:
            - name: RoleFilter
              args:
                allowedRoles: USER, ADMIN

       # /api/user/historical-data/{userId}
        - id: chatbot-historical-data
          uri: http://user-service:8082/
          predicates:
            - Path=/api/user/historical-data/*
          filters:
            - name: RoleFilter
              args:
                allowedRoles: USER, ADMIN

        # =====================================
        # ACCOUNT SERVICE — ADMIN
        # =====================================

        # /api/account/scooter-user-usage
        - id: account-scooter-user-usage
          uri: http://account-service:8083/
          predicates:
            - Path=/api/account/scooter-user-usage
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        # /api/account/toggleState/{id}
        - id: account-toggle
          uri: http://account-service:8083/
          predicates:
            - Path=/api/account/toggleState/*
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        # =====================================
        # ACCOUNT — USER PASS-THROUGH
        # =====================================

        # /api/account/users-related-to-account/{userId} (USER)
        - id: account-users-related
          uri: http://account-service:8083/
          predicates:
            - Path=/api/account/users-related-to-account/*
          filters:
            - name: RoleFilter
              args:
                allowedRoles: USER,ADMIN

        # =====================================
        # ACCOUNT SERVICE — ADMIN - USER
        # =====================================

        - id: account-create
          uri: http://account-service:8083/
          predicates:
            - Method=POST
            - Path=/api/account
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        - id: account-update
          uri: http://account-service:8083/
          predicates:
            - Method=PUT
            - Path=/api/account/{accountId}
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        - id: account-get-by-id
          uri: http://account-service:8083/
          predicates:
            - Method=GET
            - Path=/api/account/{accountId}
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        - id: account-delete
          uri: http://account-service:8083/
          predicates:
            - Method=DELETE
            - Path=/api/account/{accountId}
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        # =====================================
        # ACCOUNT USER SERVICE — ADMIN - USER
        # =====================================

        - id: account-user-create
          uri: http://account-service:8083/
          predicates:
            - Method=POST
            - Path=/api/AccountUser
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        - id: account-user-get-by-account
          uri: http://account-service:8083/
          predicates:
            - Method=GET
            - Path=/api/AccountUser/{accountId}
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        - id: account-user-delete
          uri: http://account-service:8083/
          predicates:
            - Method=DELETE
            - Path=/api/AccountUser
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        # =====================================
        # SUPPORT SERVICE — ADMIN - SUPPORT
        # =====================================

        - id: support-create
          uri: http://support-service:8086/
          predicates:
            - Method=POST
            - Path=/api/support
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,SUPPORT

        - id: support-update
          uri: http://support-service:8086/
          predicates:
            - Method=PUT
            - Path=/api/support/{id}
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,SUPPORT

        - id: support-delete
          uri: http://support-service:8086/
          predicates:
            - Method=DELETE
            - Path=/api/support/{id}
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,SUPPORT

        - id: support-get-by-id
          uri: http://support-service:8086/
          predicates:
            - Method=GET
            - Path=/api/support/{id}
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,SUPPORT

        # =====================================
        # WALLET SERVICE — ADMIN - USER
        # =====================================

        - id: wallet-create
          uri: http://wallet-service:8084/
          predicates:
            - Method=POST
            - Path=/api/wallet
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        - id: wallet-update
          uri: http://wallet-service:8084/
          predicates:
            - Method=PUT
            - Path=/api/wallet/{walletId}
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        - id: wallet-update-amount
          uri: http://wallet-service:8084/
          predicates:
            - Method=PATCH
            - Path=/api/wallet/userId/{userId}/accountId/{accountId}
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        - id: wallet-delete
          uri: http://wallet-service:8084/
          predicates:
            - Method=DELETE
            - Path=/api/wallet/{walletId}
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        # =====================================
        # SCOOTER-SERVICE — ADMIN
        # =====================================

        - id: scooter-create
          uri: http://scooter-service:8081/
          predicates:
            - Method=POST
            - Path=/api/scooter
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        - id: scooter-delete
          uri: http://scooter-service:8081/
          predicates:
            - Method=DELETE
            - Path=/api/scooter/{id}
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        - id: scooter-update
          uri: http://scooter-service:8081/
          predicates:
            - Method=PUT
            - Path=/api/scooter/{id}
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        - id: scooter-admin-list
          uri: http://scooter-service:8081/
          predicates:
            - Path=/api/scooter/scooters/**
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        # =====================================
        # STOP — ADMIN
        # =====================================
        - id: stop-admin
          uri: http://scooter-service:8081/
          predicates:
            - Path=/api/stop/**
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

          # =====================================
          # SCOOTER SERVICE — USER
          # =====================================

        - id: scooter-near-scooters
          uri: http://scooter-service:8081/
          predicates:
            - Path=/api/scooter/near-scooters
          filters:
            - name: RoleFilter
              args:
                allowedRoles: USER,ADMIN

        # =====================================
        # TRIP SERVICE — ADMIN
        # =====================================

        - id: trip-create
          uri: http://trip-service:8085/
          predicates:
            - Method=POST
            - Path=/api/trip
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        - id: trip-end
          uri: http://trip-service:8085/
          predicates:
            - Method=PUT
            - Path=/api/trip/**
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        - id: trip-start-pause
          uri: http://trip-service:8085/
          predicates:
            - Method=PATCH
            - Path=/api/trip/startPauseTrip/**
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        - id: trip-end-pause
          uri: http://trip-service:8085/
          predicates:
            - Method=PATCH
            - Path=/api/trip/endPauseTrip/**
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN,USER

        # /api/trip/total-invoice
        - id: trip-total-invoice
          uri: http://trip-service:8085/
          predicates:
            - Path=/api/trip/total-invoice
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        # /api/trip/scooters**
        - id: trip-scooters-admin
          uri: http://trip-service:8085/
          predicates:
            - Path=/api/trip/scooters/**
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        # /api/fee  (Trip-service)
        - id: trip-fee
          uri: http://trip-service:8085/
          predicates:
            - Path=/api/fee
          filters:
            - name: RoleFilter
              args:
                allowedRoles: ADMIN

        #  /api/trip/scooter-usages-by-period
        - id: trip-scooter-usages
          uri: http://trip-service:8085/
          predicates:
            - Path=/api/trip/scooter-usages-by-period/**
          filters:
            - name: RoleFilter
              args:
                allowedRoles: USER,ADMIN

       # ========== CHATBOT-SERVICE (PROTECTED — ANY ROLE) ==========
        - id: chat-bot-service
          uri: http://chat-bot-service:8090/
          predicates:
            - Path=/api/chatbot/**
          filters:
            - name: RoleFilter
              args:
                allowedRoles: USER,ADMIN,SUPPORT