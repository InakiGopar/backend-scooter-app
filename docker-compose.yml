
services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scooter_db
    ports:
      - "3306:3306"
    volumes:
      - backend-scooter-app_mysql_data:/var/lib/mysql
    networks:
      - internal

  mongo:
    image: mongo:6
    container_name: mongo-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - backend-scooter-app_mongo_data:/data/db
    networks:
      - internal

  gateway-service:
    build:
      context: .
      dockerfile: ./gateway-service/Dockerfile
    ports:
      - "8080:8080"   # Unico puerto expuesto al exterior
    depends_on:
      - auth-service
      - user-service
      - scooter-service
      - trip-service
      - account-service
      - wallet-service
      - support-service
    networks:
      - internal

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    expose:
      - "8091"
    networks:
      - internal

  user-service:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    expose:
      - "8082"
    networks:
      - internal

  scooter-service:
    build:
      context: .
      dockerfile: ./scooter-service/Dockerfile
    expose:
      - "8081"
    networks:
      - internal

  trip-service:
    build:
      context: .
      dockerfile: ./trip-service/Dockerfile
    expose:
      - "8085"
    networks:
      - internal

  account-service:
    build:
      context: .
      dockerfile: ./account-service/Dockerfile
    expose:
      - "8083"
    networks:
      - internal

  wallet-service:
    build:
      context: .
      dockerfile: ./wallet-service/Dockerfile
    expose:
      - "8084"
    networks:
      - internal

  support-service:
    build:
      context: .
      dockerfile: ./support-service/Dockerfile
    expose:
      - "8086"
    networks:
      - internal

  chat-bot-service:
    build:
      context: .
      dockerfile: ./chat-bot-service/Dockerfile
    expose:
      - "8090"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    networks:
      - internal

volumes:
  backend-scooter-app_mysql_data:
    external: true

  backend-scooter-app_mongo_data:
    external: true

networks:
  internal:
    driver: bridge